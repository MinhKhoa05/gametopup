name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            set -e

            cd /opt/gametopup

            git pull origin main

            if ! cmp -s deploy/nginx/gametopup.conf /etc/nginx/sites-available/gametopup; then
                echo "Updating nginx config..."
                sudo cp deploy/nginx/gametopup.conf /etc/nginx/sites-available/gametopup
                sudo nginx -t
                sudo systemctl reload nginx
            else
                echo "Nginx config unchanged."
            fi

            docker compose up -d --build

            docker image prune -f
