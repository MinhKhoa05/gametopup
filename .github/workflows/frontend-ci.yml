name: Frontend CI

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - frontend/**
      - deployments/**
      - docker-compose.yml
      - .github/workflows/frontend-ci.yml
  pull_request:
    branches: [ main ]
    paths:
      - frontend/**
      - deployments/**
      - docker-compose.yml
      - .github/workflows/frontend-ci.yml

permissions:
  contents: read

env:
  NODE_VERSION: 22.x

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
