services:
  db:
    image: mariadb:11
    container_name: game_topup_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
      MARIADB_DATABASE: game_topup_db
      MARIADB_USER: game_topup_user
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./database/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p\"$${MARIADB_ROOT_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game_topup_api
    restart: unless-stopped
    volumes:
      - ./uploads:/app/wwwroot/uploads
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      DB_HOST: db
      DB_PORT: 3306
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      Jwt__Key: ${Jwt__Key:?Set Jwt__Key in .env}
      App__BaseUrl: ${App__BaseUrl:?Set App__BaseUrl in .env}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0:?Set Cors__AllowedOrigins__0 in .env}
      VietQr__BankId: ${VietQr__BankId:?Set VietQr__BankId in .env}
      VietQr__AccountNo: ${VietQr__AccountNo:?Set VietQr__AccountNo in .env}
      VietQr__AccountName: ${VietQr__AccountName:?Set VietQr__AccountName in .env}
      Email__FromEmail: ${Email__FromEmail:-}
      Email__Username: ${Email__Username:-}
      Email__Password: ${Email__Password:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_HTTP_PORT:-5000}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in .env}
    container_name: game_topup_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-3000}:80"
    depends_on:
      - api

volumes:
  db_data:
