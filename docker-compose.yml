services:
  db:
    image: mariadb:11
    container_name: game_topup_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: gametopup_root
      MARIADB_DATABASE: game_topup_db
      MARIADB_USER: game_topup_user
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-pgametopup_root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game_topup_api
    restart: unless-stopped
    volumes:
      - ./uploads:/app/wwwroot/uploads
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: db
      DB_PORT: 3306
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      VIETQR_BANK_ID: ${VIETQR_BANK_ID}
      VIETQR_ACCOUNT_NO: ${VIETQR_ACCOUNT_NO}
      VIETQR_ACCOUNT_NAME: ${VIETQR_ACCOUNT_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: game_topup_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
