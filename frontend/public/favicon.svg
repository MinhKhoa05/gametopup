      <stop offset="0" stop-color="#22F3FF" stop-opacity="0.18" />
      <stop offset="0.45" stop-color="#00B7FF" stop-opacity="0.07" />
      <stop offset="1" stop-color="#2563EB" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="hexStroke" x1="92" y1="80" x2="420" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22F3FF"/>
      <stop offset="0.5" stop-color="#00B7FF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="tFill" x1="278" y1="160" x2="390" y2="390" gradientUnits="userSpaceOnUse">
